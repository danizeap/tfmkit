# Project-use output template for LGF gate applicability.
# Copy this file to sdd-plus/security/gate-applicability.yml for a project-specific LGF review.
# This template applies always-on defaults for deployable projects.
# The neutral schema/reference template is sdd-plus/security/gate-applicability.template.yml.
project: ""
change: ""
date: ""
owner: ""
reviewer: ""

source_of_truth:
  - "sdd-plus/specs/launchguardian-framework.md"
  - "sdd-plus/standards/security-shipping-standards.md"
  - "sdd-plus/security/gate-applicability.template.yml"
  - "sdd-plus/specs/MASTER_LAUNCHGUARDIAN_CONTEXT.md, if present"

status_values:
  applies:
    - true
    - false
    - "unknown"
  confidence:
    - "high"
    - "medium"
    - "low"
  evidence_type:
    - "repo_evidence"
    - "config_evidence"
    - "human_statement"
    - "unresolved_question"

high_risk_skip_rule:
  rule: "For any high-risk gate, applies: false is invalid unless human_confirmation_required, confirmed_by, confirmed_at, reason, and evidence are filled."
  required_when_high_risk_gate_is_skipped:
    human_confirmation_required: true
    confirmed_by: "required"
    confirmed_at: "required"
    reason: "required"
    evidence: "required"

always_on_gates:
  - "Gate 0 — Scope & Permission"
  - "Gate 1 — Product, Asset & Data Inventory"
  - "Gate 3 — Code Security"
  - "Gate 4 — Secrets & Config Hygiene"
  - "Gate 10 — Dependency, SBOM & Supply Chain"
  - "Gate 17 — Observability, Logs & Incident Readiness"
  - "Gate 20 — Launch Decision"

conditional_trigger_rules:
  frontend_detected:
    applies_to:
      - "Gate 5 — Frontend Exposure"
  api_routes_detected:
    applies_to:
      - "Gate 6 — API Auth & Object Authorization"
  user_input_crosses_trust_boundary:
    applies_to:
      - "Gate 7 — Injection & Input Safety"
  auth_sessions_cookies_detected:
    applies_to:
      - "Gate 8 — Auth, Sessions & CSRF"
  upload_import_export_or_url_fetch_detected:
    applies_to:
      - "Gate 9 — File Upload, SSRF, Imports & Exports"
  public_deployment_or_infrastructure_detected:
    applies_to:
      - "Gate 11 — Infrastructure, DNS, TLS & Web Hardening"
      - "Gate 12 — Resilience, DDoS, Abuse & Cost Defense"
  webhooks_jobs_or_integrations_detected:
    applies_to:
      - "Gate 13 — Webhooks, Background Jobs & Integrations"
  personal_or_sensitive_data_detected:
    applies_to:
      - "Gate 14 — Privacy, Legal & Data Lifecycle"
  llm_vector_db_or_agent_tools_detected:
    applies_to:
      - "Gate 15 — AI/RAG/Agent Security"
  tenant_org_client_team_model_detected:
    applies_to:
      - "Gate 16 — Multi-Tenant & Internal Permission Isolation"
  persistent_data_or_rotation_needs_detected:
    applies_to:
      - "Gate 18 — Backup, Recovery, Deletion & Rotation"
  business_rules_credits_payments_plans_invites_detected:
    applies_to:
      - "Gate 19 — Business Logic Abuse"
  production_launch_or_live_users_detected:
    applies_to:
      - "Gate 21 — Continuous Monitoring"

